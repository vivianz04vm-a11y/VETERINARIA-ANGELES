<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Veterinaria Ángeles de Cuatro Patas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Veterinaria Ángeles de Cuatro Patas</h1>

    <h2>Registro de Mascota</h2>

    <form>
        <label>Nombre de la mascota:</label>
        <input type="text" id="mascota">

        <label>Dueño:</label>
        <input type="text" id="dueno">

        <label>Estado:</label>
        <select id="estado">
            <option>Normal</option>
            <option>Esterilizada</option>
        </select>

        <button type="button" onclick="registrarMascota()">Registrar</button>
    </form>

    <p id="mensaje"></p>

    <script src="script.js"></script>
</body>
</html>
